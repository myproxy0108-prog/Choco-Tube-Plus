<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダウンロード - Inv-tube</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="page-dl">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-inv">Inv</span><span class="logo-tube">-tube</span>
      </a>
      <div class="search-wrapper">
        <form class="search-form" id="searchForm">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="動画を検索..."
            autocomplete="off"
          />
          <button type="submit" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
        <ul id="suggestions" class="suggestions-list" hidden></ul>
      </div>
      <nav class="header-nav">
        <a href="/dl" class="header-nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ダウンロード
        </a>
        <a href="/library" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          ライブラリ
        </a>
        <a href="/settings" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          設定
        </a>
      </nav>
    </div>
  </header>

  <main class="dl-main">

    <!-- URL入力フォーム -->
    <div class="dl-form-wrap">
      <div class="dl-form-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <h1 class="dl-form-title">動画をダウンロード</h1>
      <p class="dl-form-desc">YouTubeの動画URLまたは動画IDを貼り付けてください</p>
      <form class="dl-url-form" id="dlUrlForm">
        <div class="dl-url-input-wrap">
          <input
            type="text"
            id="dlUrlInput"
            class="dl-url-input"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" class="dl-url-btn" id="dlUrlBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
            解析
          </button>
        </div>
        <div class="dl-url-error" id="dlUrlError" hidden></div>
      </form>
    </div>

    <!-- 解析結果 -->
    <div class="dl-result" id="dlResult" hidden>

      <!-- Hero: thumbnail + info -->
      <div class="dl-hero" id="dlHero">

        <!-- Left: thumbnail player + action buttons -->
        <div class="dl-thumb-col">
          <div class="dl-thumb-wrap">
            <div class="dl-thumb-skeleton" id="dlThumbSkeleton"></div>
            <img class="dl-thumb" id="dlThumb" src="" alt="" hidden />
            <video class="dl-inline-video" id="dlInlineVideo" controls hidden></video>
            <iframe class="dl-inline-iframe" id="dlInlineIframe" hidden allowfullscreen
              allow="autoplay; encrypted-media; picture-in-picture"></iframe>
            <button class="dl-play-overlay" id="dlPlayOverlay" title="再生モードを選択">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

        </div>

        <!-- Right: info + buttons -->
        <div class="dl-info">
          <div class="dl-info-skeleton" id="dlInfoSkeleton">
            <div class="sk-line" style="height:22px;width:90%;margin-bottom:.6rem"></div>
            <div class="sk-line" style="height:14px;width:55%;margin-bottom:.4rem"></div>
            <div class="sk-line" style="height:13px;width:40%"></div>
          </div>
          <div class="dl-info-inner" id="dlInfoInner" hidden>
            <h2 class="dl-title" id="dlTitle"></h2>
            <div class="dl-channel" id="dlChannel"></div>
            <div class="dl-meta" id="dlMeta"></div>
            <div class="dl-info-links" id="dlThumbActions" hidden>
              <a class="dl-watch-btn" id="dlWatchBtn" href="#">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="2" y="3" width="20" height="14" rx="2"/><polygon points="10 8 16 11 10 14 10 8" fill="currentColor" stroke="none"/><path d="M8 21h8M12 17v4"/></svg>
                Inv-tubeで視聴
              </a>
              <a class="dl-yt-link" id="dlYtLink" href="#" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
                YouTubeで開く
              </a>
            </div>
          </div>
        </div>

      </div>

      <!-- ローディング中 -->
      <div class="dl-loading" id="dlLoading" hidden>
        <div class="dl-spinner"></div>
        <span>ストリーム情報を取得中...</span>
      </div>

      <!-- エラー -->
      <div class="dl-fetch-error" id="dlFetchError" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="dlFetchErrorMsg">情報の取得に失敗しました。</span>
      </div>

      <!-- Download sections -->
      <div class="dl-sections" id="dlSections"></div>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
